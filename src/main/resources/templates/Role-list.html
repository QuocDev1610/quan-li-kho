<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" class="layout-wide" data-assets-path="/assets/" data-template="vertical-menu-template-free">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

    <title>Quản lý Phân Quyền (Role)</title>
    <meta name="description" content="" />

    <link rel="icon" type="image/x-icon" th:href="@{/assets/img/favicon/favicon.ico}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" th:href="@{/assets/vendor/fonts/iconify-icons.css}" />
    <link rel="stylesheet" th:href="@{/assets/vendor/css/core.css}" />
    <link rel="stylesheet" th:href="@{/assets/css/demo.css}" />
    <link rel="stylesheet" th:href="@{/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css}" />
    <link rel="stylesheet" th:href="@{/assets/vendor/css/pages/page-misc.css}" />

    <script th:src="@{/assets/vendor/js/helpers.js}"></script>
    <script th:src="@{/assets/js/config.js}"></script>
</head>

<body>
<div class="layout-wrapper layout-content-navbar">
    <div class="layout-container">

        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="layout-page">

            <div th:replace="~{fragments/navbar :: navbar}"></div>

            <div class="content-wrapper">

                <div class="container-xxl flex-grow-1 container-p-y">

                    <div th:if="${success != null}" class="alert alert-success alert-dismissible fade show mb-4" role="alert" id="alertMessage">
                        <i class="bx bx-check-circle me-2"></i>
                        <strong th:text="${success}">Thông báo thành công!</strong>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <div th:if="${error != null}" class="alert alert-danger alert-dismissible fade show mb-4" role="alert" id="errorMessage">
                        <i class="bx bx-error-circle me-2"></i>
                        <strong th:text="${error}">Thông báo lỗi!</strong>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <div class="card mb-4">
                        <div class="card-body">
                            <div class="col-12 text-end">
                                <button type="button" class="btn btn-success" onclick="openRoleModal('/Role/add')">
                                    <i class="bx bx-plus me-1"></i> Add Role
                                </button>
                                <a th:href="@{/Role/list}" class="btn btn-outline-secondary">
                                    <i class="bx bx-refresh me-1"></i> Làm mới
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Danh sách Role</h5>
                        </div>

                        <div class="table-responsive text-nowrap">
                            <table class="table table-hover">
                                <thead>
                                <tr>
                                    <th>STT</th>
                                    <th>Role Name</th>
                                    <th>Description</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                                </thead>

                                <tbody class="table-border-bottom-0">
                                <tr th:each="item, stat : ${Roles}">
                                    <td><strong th:text="${stat.count}">1</strong></td>
                                    <td>
                                        <span class="badge bg-label-secondary" th:text="${item.roleName}">Role Name</span>
                                    </td>
                                    <td th:text="${item.description}">Mô tả ở đây</td>
                                    <td>
                                        <span th:if="${item.activeFlag == 1}" class="badge bg-label-success me-1">Active</span>
                                        <span th:if="${item.activeFlag == 0}" class="badge bg-label-danger me-1">Inactive</span>
                                    </td>
                                    <td>
                                        <div class="dropdown">
                                            <button type="button" class="btn p-0 dropdown-toggle hide-arrow" data-bs-toggle="dropdown">
                                                <i class="icon-base bx bx-dots-vertical-rounded"></i>
                                            </button>
                                            <div class="dropdown-menu">
                                                <a class="dropdown-item" href="javascript:void(0);" th:onclick="'openRoleModal(\'/Role/view/' + ${item.id} + '\')'">
                                                    <i class="icon-base bx bx-show me-2"></i> Xem
                                                </a>
                                                <a class="dropdown-item" th:href="@{/Role/edit/{id}(id=${item.id})}">
                                                    <i class="icon-base bx bx-edit-alt me-2"></i> Sửa
                                                </a>
                                                <a class="dropdown-item text-danger" th:href="@{/Role/delete/{id}(id=${item.id})}" onclick="return confirm('Bạn có chắc chắn muốn xóa quyền này?');">
                                                    <i class="icon-base bx bx-trash me-2"></i> Xóa
                                                </a>
                                            </div>
                                        </div>
                                    </td>
                                </tr>

                                <tr th:if="${Roles == null or #lists.isEmpty(Roles)}">
                                    <td colspan="5" class="text-center text-muted py-4">
                                        Không tìm thấy dữ liệu phù hợp.
                                    </td>
                                </tr>
                                </tbody>
                            </table>

                            <div class="card-footer d-flex justify-content-center">
                                <nav aria-label="Page navigation">
                                    <ul class="pagination mb-0" th:if="${paging != null and paging.totalPages > 0}">
                                        <li class="page-item" th:classappend="${paging.currentPage == 1 ? 'disabled' : ''}">
                                            <a class="page-link" th:href="@{/Role/list/{page}(page=${paging.currentPage - 1})}" aria-label="Previous">
                                                <i class="tf-icon bx bx-chevron-left"></i>
                                            </a>
                                        </li>

                                        <li class="page-item" th:classappend="${paging.currentPage == i ? 'active' : ''}" th:each="i : ${#numbers.sequence(1, paging.totalPages)}">
                                            <a class="page-link" th:href="@{/Role/list/{page}(page=${i})}" th:text="${i}">1</a>
                                        </li>

                                        <li class="page-item" th:classappend="${paging.currentPage == paging.totalPages ? 'disabled' : ''}">
                                            <a class="page-link" th:href="@{/Role/list/{page}(page=${paging.currentPage + 1})}" aria-label="Next">
                                                <i class="tf-icon bx bx-chevron-right"></i>
                                            </a>
                                        </li>
                                    </ul>
                                </nav>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:replace="~{fragments/footer :: footer}"></div>
                <div class="content-backdrop fade"></div>

            </div>
        </div>
    </div>
    <div class="layout-overlay layout-menu-toggle"></div>
</div>

<script th:src="@{/assets/vendor/libs/jquery/jquery.js}"></script>
<script th:src="@{/assets/vendor/libs/popper/popper.js}"></script>
<script th:src="@{/assets/vendor/js/bootstrap.js}"></script>
<script th:src="@{/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js}"></script>
<script th:src="@{/assets/vendor/js/menu.js}"></script>
<script th:src="@{/assets/js/main.js}"></script>

<script type="text/javascript">
    $(document).ready(function() {
        // Tự động ẩn thông báo sau 3 giây
        var $alert = $('#alertMessage, #errorMessage');
        if ($alert.length > 0) {
            setTimeout(function() {
                $alert.fadeOut('slow', function() {
                    $(this).remove();
                });
            }, 3000);
        }
    });
</script>

</body>
</html>
