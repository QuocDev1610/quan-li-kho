<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" class="layout-wide" data-assets-path="/assets/" data-template="vertical-menu-template-free">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

    <title>Cập nhật thông tin</title>
    <meta name="description" content="" />

    <link rel="icon" type="image/x-icon" th:href="@{/assets/img/favicon/favicon.ico}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" th:href="@{/assets/vendor/fonts/iconify-icons.css}" />
    <link rel="stylesheet" th:href="@{/assets/vendor/css/core.css}" />
    <link rel="stylesheet" th:href="@{/assets/css/demo.css}" />
    <link rel="stylesheet" th:href="@{/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css}" />
    <link rel="stylesheet" th:href="@{/assets/vendor/css/pages/page-misc.css}" />

    <script th:src="@{/assets/vendor/js/helpers.js}"></script>
    <script th:src="@{/assets/js/config.js}"></script>
</head>

<body>
<div class="layout-wrapper layout-content-navbar">
    <div class="layout-container">

        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="layout-page">

            <div th:replace="~{fragments/navbar :: navbar}"></div>

            <div class="content-wrapper">

                <div class="container-xxl flex-grow-1 container-p-y">
                    <div class="">
                        <div class="page-title">
                            <div class="title_left">
                                <h4 class="form-title" th:text="${titleForm}">Tiêu đề trang mặc định</h4>
                            </div>
                        </div>
                        <div class="clearfix"></div>

                        <div class="card mb-4">
                            <form class="card-body" th:object="${model}" th:action="@{/goods-receipt/save}" method="post" enctype="multipart/form-data">
                                <input type="hidden" th:field="*{id}" />
                                <input type="hidden" th:field="*{createDate}" />
                                <input type="hidden" th:field="*{updateDate}" />
                                <input type="hidden" th:field="*{activeFlag}" />

                                <div class="row mb-6">
                                    <label class="col-sm-3 col-form-label" for="product">Procduct <span class="text-danger">*</span></label>
                                    <div class="col-sm-9">

                                        <select id="product" class="form-select" th:field="*{product.name}">

                                            <option value="">-- Chọn Product --</option>

                                            <option th:each="tl : ${mapProduct}"
                                                    th:value="${tl.key}"
                                                    th:text="${tl.value}">
                                            </option>

                                        </select>
                                    </div> </div>

                                <div class="row mb-6">
                                    <label class="col-sm-3 col-form-label" for="code">Code</label>
                                    <div class="col-sm-9">
                                        <div class="input-group input-group-merge">
                                            <input type="text" id="code" class="form-control" th:field="*{code}" placeholder="Nhập mã code...">
                                            <button type="button" class="btn btn-outline-primary" id="btnSearch">
                                                <i class="bx bx-search"></i>
                                            </button>
                                        </div>
                                        <p th:if="${#fields.hasErrors('code')}" th:errors="*{code}" class="text-danger mt-1 mb-0"></p>
                                    </div>
                                </div>

                                <div class="row mb-6">
                                    <label class="col-sm-3 col-form-label" for="name">Qty</label>
                                    <div class="col-sm-9">
                                        <input type="text" id="name" th:field="*{qty}" class="form-control" placeholder="Số lượng..." autofocus>
                                        <p th:if="${#fields.hasErrors('qty')}" th:errors="*{qty}" class="text-danger mt-1 mb-0"></p>
                                    </div>
                                </div>

                                <div class="row mb-6">
                                    <label class="col-sm-3 col-form-label" for="description">Price</label>
                                    <div class="col-sm-9">
                                        <div class="input-group input-group-merge">
                                            <input type="text" id="description" class="form-control" th:field="*{price}" placeholder="Giá...">
                                        </div>
                                        <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="text-danger mt-1 mb-0"></p>
                                    </div>
                                </div>
                                
                                <div class="row justify-content-end">
                                    <div class="col-sm-9">
                                        <button type="submit" class="btn btn-primary me-3">Submit</button>
                                        <a th:href="@{/goods-receipt/list}" class="btn btn-label-secondary">Cancel</a>
                                    </div>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>
            </div> <div th:replace="~{fragments/footer :: footer}"></div>
            <div class="content-backdrop fade"></div>

        </div> </div> </div> <div class="layout-overlay layout-menu-toggle"></div>
</div> <script th:src="@{/assets/vendor/libs/jquery/jquery.js}"></script>
<script th:src="@{/assets/vendor/libs/popper/popper.js}"></script>
<script th:src="@{/assets/vendor/js/bootstrap.js}"></script>
<script th:src="@{/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js}"></script>
<script th:src="@{/assets/vendor/js/menu.js}"></script>
<script th:src="@{/assets/js/main.js}"></script>
<script async defer src="https://buttons.github.io/buttons.js"></script>
<script type="text/javascript">
    $(document).ready(function() {
        // 1. Lấy URL hiện tại (VD: /Invoice/add)
        var currentUrl = window.location.pathname;

        // 2. Cắt lấy phần gốc của URL hiện tại (VD: /Invoice)
        var currentBase = currentUrl.substring(0, currentUrl.lastIndexOf('/'));

        $('.menu-inner .menu-link').each(function() {
            var menuUrl = $(this).attr('href'); // Lấy link trong menu (VD: /Invoice/list)

            if (menuUrl) {
                // Cắt lấy phần gốc của menu (VD: /Invoice)
                var menuBase = menuUrl.substring(0, menuUrl.lastIndexOf('/'));

                // 3. Khớp lệnh: Trùng link 100% HOẶC cùng chung phần gốc module
                if (currentUrl === menuUrl || (menuBase !== '' && currentBase === menuBase && menuUrl !== '/')) {

                    // Làm sáng menu con
                    $(this).parent('li').addClass('active');

                    // Mở rộng và làm sáng thư mục cha
                    $(this).closest('.menu-item').parents('.menu-item').addClass('active open');
                }
            }
        });
    });
</script>
<script>
    $(document).ready(function() {
        $('#btnSearch').on('click', function() {
            var code = $('#code').val();
            if(!code) { alert("Vui lòng nhập code!"); return; }

            $.ajax({
                url: '/api/goods-receipt/check', // Sửa lại đúng URL API của bạn
                type: 'GET',
                data: { code: code },
                success: function(data) {
                    if (confirm("Mã code này đã tồn tại, bạn có muốn điền thông tin vào form để sửa không?")) {
                        // Điền dữ liệu vào form (Sửa lại đúng ID và trường dữ liệu của Invoice)
                        $('#id').val(data.id);
                        $('#qty').val(data.qty);
                        $('#price').val(data.price);

                        // Đổi tiêu đề form
                        $('.form-title').text("Edit Invoice");
                    }
                },
                error: function() {
                    alert("Mã code này chưa tồn tại, bạn có thể thêm mới.");

                    // Chỉ clear số lượng và giá, KHÔNG clear ô code
                    $('#id').val('');
                    $('#qty').val('');
                    $('#price').val('');
                }
            });
        });
    });
</script>
</body>
</html>
