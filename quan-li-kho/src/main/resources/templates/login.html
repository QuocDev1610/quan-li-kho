    <!-- Custom Login Styles -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #1e5a96 0%, #2980b9 100%);
            --secondary-gradient: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            --inventory-dark: #1a3a52;
            --inventory-light: #2980b9;
        }

        body {
            background: linear-gradient(135deg, #0f3650 0%, #1e5a96 25%, #2980b9 50%, #16a085 75%, #0f3650 100%);
            background-size: 400% 400%;
            background-position: 0% 50%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Public Sans', sans-serif;
            position: relative;
            overflow: visible;
            animation: gradientShift 15s ease infinite;
        }

        /* Animated gradient background */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Multiple floating layers */
        body::before,
        body::after {
            content: '';
            position: fixed;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            background:
                radial-gradient(circle at 20% 30%, rgba(52, 211, 153, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(245, 158, 11, 0.1) 0%, transparent 50%);
            animation: float1 20s ease-in-out infinite;
        }

        body::after {
            background:
                radial-gradient(circle at 80% 20%, rgba(243, 156, 18, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 20% 60%, rgba(30, 90, 150, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 60% 40%, rgba(22, 160, 133, 0.12) 0%, transparent 50%);
            animation: float2 25s ease-in-out infinite reverse;
        }

        @keyframes float1 {
            0%, 100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
            25% { transform: translateY(30px) translateX(-20px) rotate(90deg); }
            50% { transform: translateY(60px) translateX(30px) rotate(180deg); }
            75% { transform: translateY(30px) translateX(-30px) rotate(270deg); }
        }

        @keyframes float2 {
            0%, 100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
            25% { transform: translateY(-40px) translateX(30px) rotate(-90deg); }
            50% { transform: translateY(-60px) translateX(-20px) rotate(-180deg); }
            75% { transform: translateY(-30px) translateX(40px) rotate(-270deg); }
        }

        /* Animated shapes - top left */
        .shape-blob-1 {
            position: fixed;
            top: -100px;
            left: -100px;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, rgba(41, 128, 185, 0.3), rgba(22, 160, 133, 0.2));
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            filter: blur(40px);
            animation: blobMove1 15s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        /* Animated shapes - bottom right */
        .shape-blob-2 {
            position: fixed;
            bottom: -150px;
            right: -150px;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.25), rgba(41, 128, 185, 0.2));
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            filter: blur(50px);
            animation: blobMove2 20s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        /* Animated shapes - center */
        .shape-blob-3 {
            position: fixed;
            top: 50%;
            right: -50px;
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, rgba(22, 160, 133, 0.2), rgba(243, 156, 18, 0.15));
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            filter: blur(45px);
            animation: blobMove3 18s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes blobMove1 {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translate(50px, -30px) rotate(120deg) scale(1.1); }
            66% { transform: translate(-30px, 40px) rotate(240deg) scale(0.95); }
        }

        @keyframes blobMove2 {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translate(-40px, 30px) rotate(-120deg) scale(1.05); }
            66% { transform: translate(60px, -20px) rotate(-240deg) scale(0.98); }
        }

        @keyframes blobMove3 {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translate(-50px, 20px) rotate(110deg) scale(1.08); }
            66% { transform: translate(40px, -35px) rotate(240deg) scale(0.93); }
        }

        /* Particle effect */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            font-size: 2rem;
            opacity: 0.15;
            animation: float-particle linear infinite;
        }

        @keyframes float-particle {
            to {
                transform: translate(0, 100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Shine/gloss overlay */
        .shine-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                45deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.05) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            background-size: 200% 200%;
            pointer-events: none;
            z-index: 1;
            animation: shineSweep 3s ease-in-out infinite;
        }

        @keyframes shineSweep {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        body > * {
            position: relative;
            z-index: 2;
        }

        .authentication-wrapper {
            padding: 2rem 1rem !important;
            position: relative;
            z-index: 2;
        }

        .authentication-inner {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
        }

        .card-body {
            padding: 3rem 2rem;
        }

        /* Logo Section */
        .app-brand {
            margin-bottom: 2.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-brand-link {
            text-decoration: none !important;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.3s ease;
        }

        .app-brand-link:hover {
            transform: scale(1.05);
        }

        .app-brand-logo svg {
            width: 35px;
            height: auto;
        }

        .app-brand-text {
            font-size: 1.75rem;
            background: linear-gradient(135deg, #1e5a96 0%, #f39c12 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700 !important;
        }

        /* Title and Description */
        .card-body h4 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }

        .card-body > p {
            color: #718096;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* Form Labels */
        .form-label {
            font-weight: 600;
            color: #2d3748;
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Form Controls */
        .form-control,
        .input-group-text {
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background-color: #f7fafc;
        }

        .form-control:focus,
        .input-group-text:focus-within {
            border-color: #2980b9;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(41, 128, 185, 0.1);
        }

        .form-control::placeholder {
            color: #a0aec0;
        }

        .form-control {
            height: 45px;
        }

        .input-group {
            display: flex;
        }

        .input-group-text {
            border: 1.5px solid #e2e8f0;
            background-color: #f7fafc;
            color: #718096;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: none;
        }

        .input-group-text:hover {
            color: #2980b9;
            background-color: #edf2f7;
        }

        /* Form Password Toggle */
        .form-password-toggle .input-group-text {
            padding: 0 1.25rem;
        }

        .password-toggle-icon {
            display: inline-block;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        /* Error Messages */
        .text-danger {
            color: #e53e3e !important;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .text-danger::before {
            content: "⚠";
            font-size: 0.9rem;
        }

        /* Form Check (Remember Me) */
        .form-check-input {
            width: 1.25rem;
            height: 1.25rem;
            border: 1.5px solid #cbd5e0;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.25rem;
        }

        .form-check-input:checked {
            background-color: #2980b9;
            border-color: #2980b9;
            box-shadow: 0 0 0 2px rgba(41, 128, 185, 0.1);
        }

        .form-check-input:focus {
            border-color: #2980b9;
            box-shadow: 0 0 0 3px rgba(41, 128, 185, 0.1);
        }

        .form-check-label {
            color: #4a5568;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            font-size: 0.9rem;
        }

        /* Form Actions Row */
        .form-check-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .form-check-group a {
            color: #2980b9;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .form-check-group a:hover {
            color: #1e5a96;
            text-decoration: underline;
        }

        /* Submit Button */
        .btn-primary {
            background: linear-gradient(135deg, #2980b9 0%, #1e5a96 100%);
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            font-size: 1rem;
            height: 45px;
            transition: all 0.3s ease;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(41, 128, 185, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(41, 128, 185, 0.4);
            background: linear-gradient(135deg, #1e5a96 0%, #16a085 100%);
        }

        .btn-primary:active,
        .btn-primary:focus {
            box-shadow: 0 4px 15px rgba(41, 128, 185, 0.3);
        }

        /* Auth Footer */
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #e2e8f0;
        }

        .auth-footer p {
            color: #718096;
            font-size: 0.95rem;
            margin: 0;
        }

        .auth-footer a {
            color: #2980b9;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .auth-footer a:hover {
            color: #1e5a96;
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 576px) {
            .card-body {
                padding: 2rem 1.5rem;
            }

            .card-body h4 {
                font-size: 1.5rem;
            }

            .form-label {
                font-size: 0.85rem;
            }

            .form-check-group {
                flex-direction: column;
                align-items: flex-start;
            }

            .form-check-group a {
                align-self: flex-end;
            }

            .app-brand-link {
                flex-direction: column;
            }

            .app-brand-text {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 360px) {
            .card-body {
                padding: 1.5rem 1rem;
            }

            .card-body h4 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>

<body>
<!-- Animated background elements -->
<div class="shape-blob-1"></div>
<div class="shape-blob-2"></div>
<div class="shape-blob-3"></div>
<div class="shine-overlay"></div>

<!-- Content -->

<div class="container-xxl">
    <div class="authentication-wrapper authentication-basic container-p-y">
        <div class="authentication-inner">
            <!-- Register -->
            <div class="card px-sm-6 px-0">
                <div class="card-body">
                    <!-- Logo -->
                    <div class="app-brand justify-content-center">
                        <a th:href="index.html" class="app-brand-link gap-2">

                    </span>
                  </span>
                            <span class="app-brand-text demo text-heading fw-bold">Inventory</span>
                        </a>
                    </div>
                    <!-- /Logo -->
                    <h4 class="mb-1">Welcome to Inventory! 👋</h4>
                    <p class="mb-6">Please sign-in to your account and start the adventure</p>

                    <form id="formAuthenication" class="mb-6" th:action="@{/login}" th:object="${user}" method="post">
                        <!-- Username Field -->
                        <div class="mb-4">
                            <label for="formAuthenication" class="form-label">Account or Username</label>
                            <input
                                    type="text"
                                    class="form-control"
                                    th:field="*{userName}"
                                    placeholder="Enter your username"
                                    autofocus />
                            <p th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}" class="text-danger mt-1"></p>
                        </div>

                        <!-- Password Field -->
                        <div class="mb-4 form-password-toggle">
                            <label class="form-label" for="password">Password</label>
                            <div class="input-group input-group-merge">
                                <input
                                        type="password"
                                        id="password"
                                        class="form-control"
                                        th:field="*{password}"
                                        placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;"
                                        aria-describedby="password" />
                                <span class="input-group-text cursor-pointer"><i class="icon-base bx bx-hide"></i></span>
                            </div>
                            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger mt-1"></p>

                        <div class="form-check-group mb-6">
                            <div class="form-check mb-0">
                                <input class="form-check-input" type="checkbox" id="remember-me" name="remember-me" />

                            </a>

                            <button class="btn btn-primary d-grid w-100" type="submit">Sign In</button>
                        </div>

                    <!-- Registration Link -->

<!-- Password Toggle Script -->
<script>
    // Generate animated particles
    function generateParticles() {
        const particleIcons = ['📦', '📫', '📊', '🚚', '📈', '💼', '🏭', '📋'];

        // Remove existing particles first
        const existingParticles = document.querySelectorAll('.particle');
        existingParticles.forEach(p => p.remove());

        for (let i = 0; i < 8; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';

            const randomIcon = particleIcons[Math.floor(Math.random() * particleIcons.length)];
            const randomLeft = Math.random() * 100;
            const randomDelay = Math.random() * 5;
            const randomDuration = 8 + Math.random() * 4;

            particle.style.left = randomLeft + '%';
            particle.style.top = '-50px';
            particle.style.animation = `float-particle ${randomDuration}s linear infinite`;
            particle.style.animationDelay = randomDelay + 's';
            particle.style.opacity = Math.random() * 0.15 + 0.05;

            particle.textContent = randomIcon;

            document.body.appendChild(particle);
        }
    }

    // Initialize particles on page load
    document.addEventListener('DOMContentLoaded', function() {
        // Generate particles
        generateParticles();

        // Password toggle functionality
        const passwordField = document.getElementById('password');
        const toggleBtn = document.querySelector('.form-password-toggle .input-group-text');

        if (toggleBtn && passwordField) {
            toggleBtn.addEventListener('click', function(e) {
                e.preventDefault();

                // Toggle password visibility
                if (passwordField.type === 'password') {
                    passwordField.type = 'text';
                    toggleBtn.innerHTML = '<i class="icon-base bx bx-show"></i>';
                } else {
                    passwordField.type = 'password';
                    toggleBtn.innerHTML = '<i class="icon-base bx bx-hide"></i>';
                }
            });
        }
    });
</script>
